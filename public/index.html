<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Ride Smart AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#050505;
  color:white;
  padding:14px;
  padding-bottom:90px;
}

.title{font-size:30px;font-weight:900;margin-bottom:6px}
.subtitle{color:#999;font-size:14px;margin-bottom:18px}

.weather-banner{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:14px 16px;
  border-radius:16px;
  margin-bottom:18px;
  font-size:15px;
  font-weight:800;
}

.best-move{
  background:linear-gradient(135deg,#00ff88,#00c96b);
  color:#000;
  border-radius:22px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 10px 35px rgba(0,255,136,.18);
}

.best-move-label{font-size:12px;font-weight:900;letter-spacing:1px;opacity:.8}
.best-move-name{font-size:34px;font-weight:900;margin-top:8px}

.best-move-action{
  margin-top:10px;
  display:inline-block;
  background:#000;
  color:#00ff88;
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.best-move-grid{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.best-move-stat{
  background:rgba(0,0,0,.18);
  padding:12px;
  border-radius:16px;
}

.best-move-stat-label{font-size:11px;font-weight:800;opacity:.7}
.best-move-stat-value{font-size:22px;font-weight:900;margin-top:4px}

.order-checker{
  background:#111;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.order-checker h2{font-size:20px;margin-bottom:12px}

.check-btn{
  width:100%;
  margin-top:12px;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#00ff88;
  color:#000;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}

.order-result{
  margin-top:14px;
  padding:18px;
  border-radius:18px;
  font-weight:900;
  font-size:18px;
  line-height:1.5;
}

.good{background:#00ff88;color:#000}
.medium{background:#facc15;color:#000}
.bad{background:#ef4444;color:#fff}

#locationBtn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:18px;
  margin-bottom:18px;
  background:#00ff88;
  color:#000;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

#locationBtn:disabled{background:#444;cursor:not-allowed}

#map{
  width:100%;
  height:360px;
  border-radius:22px;
  margin-bottom:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 10px 40px rgba(0,0,0,.45);
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

.card{
  background:#111;
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:18px;
  box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.zone-name{font-size:22px;font-weight:900}

.score{
  font-size:52px;
  font-weight:900;
  margin-top:8px;
  color:#00ff88;
}

.action{
  display:inline-block;
  margin-top:10px;
  padding:9px 13px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.go-now{background:#00ff88;color:#000}
.wait-nearby{background:#facc15;color:#000}
.avoid{background:#ef4444;color:#fff}

.map-btn{
  margin-top:12px;
  width:100%;
  padding:13px 14px;
  border:none;
  border-radius:14px;
  background:#fff;
  color:#000;
  font-weight:900;
  cursor:pointer;
}

.nav-btn{background:#00ff88;color:#000}

.recommendation{
  margin-top:16px;
  color:#bbb;
  line-height:1.7;
  font-size:14px;
}

.top-badge{
  display:inline-block;
  background:#00ff88;
  color:black;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-bottom:14px;
}

.zone-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.risk-label{
  margin-top:7px;
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.risk-label.low{
  background:rgba(0,255,136,.16);
  color:#00ff88;
}

.risk-label.medium{
  background:rgba(250,204,21,.18);
  color:#facc15;
}

.risk-label.high{
  background:rgba(239,68,68,.18);
  color:#ef4444;
}

.risk-low{
  border-color:rgba(0,255,136,.35);
}

.risk-medium{
  border-color:rgba(250,204,21,.45);
}

.risk-high{
  border-color:rgba(239,68,68,.45);
}

.ai-insights{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.insight-pill{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  color:#e5e7eb;
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

/* --- PREMIUM CSS SECTIONS --- */
.premium-result{
  margin-top:18px;
  padding:26px;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(34,18,30,.98),rgba(25,18,30,.98));
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.premium-result.reject{
  border-color:rgba(239,68,68,.45);
  box-shadow:0 0 45px rgba(239,68,68,.14);
}

.premium-result.accept{
  border-color:rgba(0,255,136,.45);
  box-shadow:0 0 45px rgba(0,255,136,.14);
}

.premium-result.wait{
  border-color:rgba(250,204,21,.45);
  box-shadow:0 0 45px rgba(250,204,21,.14);
}

.premium-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.decision-icon{
  width:54px;
  height:54px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:900;
  background:#ef4444;
  color:#111;
}

.accept .decision-icon{background:#00ff88}
.wait .decision-icon{background:#facc15}

.platform-label{
  color:#9ca3af;
  font-size:20px;
  margin-top:6px;
  font-weight:700;
}

.metric-pills{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:22px;
}

.metric-pill{
  background:#334155;
  color:#fff;
  padding:12px 16px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
}

.metric-pill span{
  color:#94a3b8;
  font-weight:700;
}

.trip-row{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  color:#b8beca;
  font-size:20px;
  font-weight:800;
  margin-bottom:20px;
}

.reason-box{
  background:rgba(127,29,29,.45);
  color:#fecaca;
  padding:18px;
  border-radius:18px;
  font-size:20px;
  line-height:1.6;
  margin-bottom:20px;
}

.accept .reason-box{
  background:rgba(6,78,59,.45);
  color:#bbf7d0}

.wait .reason-box{
  background:rgba(113,63,18,.45);
  color:#fde68a;
}

.earnings-btn{
  width:100%;
  border:none;
  background:#2563eb;
  color:white;
  padding:18px;
  border-radius:18px;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
}

.premium-header{
  display:grid !important;
  grid-template-columns:1fr auto;
  align-items:start;
  gap:12px;
}

.premium-pay{
  font-size:clamp(34px, 9vw, 58px) !important;
  max-width:100%;
  line-height:1;
  white-space:nowrap;
  font-weight:900;
  color:#fff;
}

.decision-title{
  font-size:clamp(34px, 9vw, 58px) !important;
  font-weight:900;
  line-height:1;
  color:#ef4444;
}

.accept .decision-title{color:#00ff88}
.wait .decision-title{color:#facc15}

@media(max-width:520px){
  .premium-result{
    padding:22px 18px !important;
    overflow:hidden;
  }

  .premium-header{
    display:flex !important;
    flex-direction:column !important;
    align-items:flex-start !important;
    gap:18px;
  }

  .premium-left{
    width:100%;
  }

  .premium-pay{
    margin-left:0 !important;
    width:100%;
    font-size:clamp(42px, 14vw, 62px) !important;
    text-align:left;
    white-space:normal !important;
  }

  .decision-title{
    font-size:clamp(38px, 12vw, 58px) !important;
  }
}

@media(min-width:900px){
  body{padding:30px}
  .title{font-size:42px}
  .subtitle{font-size:16px}
  #map{height:600px}
  .grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
}
</style>
</head>

<body>

<h1 class="title">🚘 Ride Smart AI</h1>
<p class="subtitle">Smart Uber Decision Engine</p>

<a href="/airports.html" style="text-decoration:none;">
  <button class="check-btn" style="margin-bottom:18px;">
    ✈️ Ver Aeropuertos y Vuelos
  </button>
</a>

<div id="weather"></div>
<div id="bestMove"></div>

<div class="order-checker">
  <h2>📦 Uber Order Checker</h2>

  <input id="uberScreenshot" type="file" accept="image/*" hidden />

  <button onclick="document.getElementById('uberScreenshot').click()" class="check-btn">
    📸 Upload Uber Screenshot
  </button>

  <div id="ocrStatus"></div>
  <div id="orderResult"></div>
</div>

<button id="locationBtn">📍 Use My Location</button>

<div id="map"></div>

<div class="grid" id="zones"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
let map;
let markers = [];
let userMarker = null;
let markerByZone = {};
let infoByZone = {};

let currentUserLocation = { lat:41.8781, lng:-87.6298 };

const zoneLocations = {
  "O'Hare Airport": { lat:41.9742, lng:-87.9073 },
  "Midway Airport": { lat:41.7868, lng:-87.7522 },
  "Downtown Chicago": { lat:41.8781, lng:-87.6298 },
  "Rosemont": { lat:41.9953, lng:-87.8847 },
  "Evanston": { lat:42.0451, lng:-87.6877 },
  "Oak Park": { lat:41.8850, lng:-87.7845 },
  "Naperville": { lat:41.7508, lng:-88.1535 },
  "Des Plaines": { lat:42.0334, lng:-87.8834 },
  "Skokie": { lat:42.0324, lng:-87.7416 },
  "Arlington Heights": { lat:42.0884, lng:-87.9806 },
  "Schaumburg": { lat:42.0334, lng:-88.0834 },
  "Cicero": { lat:41.8456, lng:-87.7539 },
  "Glenview": { lat:42.0698, lng:-87.7878 },
  "Elmhurst": { lat:41.8995, lng:-87.9403 },
  "Downers Grove": { lat:41.8089, lng:-88.0112 },
  "La Grange": { lat:41.8050, lng:-87.8692 },
  "Wheaton": { lat:41.8661, lng:-88.1070 },
  "Wilmette": { lat:42.0723, lng:-87.7228 },
  "Park Ridge": { lat:42.0111, lng:-87.8406 },
  "Berwyn": { lat:41.8506, lng:-87.7937 },
  "Tinley Park": { lat:41.5734, lng:-87.7845 },
  "Bolingbrook": { lat:41.6986, lng:-88.0684 },
  "Northbrook": { lat:42.1275, lng:-87.8290 }
};

function initMap(){
  const mapDiv = document.getElementById('map');
  if(!mapDiv) return;
  map = new google.maps.Map(mapDiv, {
    center:{ lat:41.8781, lng:-87.6298 },
    zoom:10,
    styles:[
      { elementType:"geometry", stylers:[{ color:"#111111" }] },
      { elementType:"labels.text.stroke", stylers:[{ color:"#111111" }] },
      { elementType:"labels.text.fill", stylers:[{ color:"#ffffff" }] },
      { featureType:"road", elementType:"geometry", stylers:[{ color:"#2a2a2a" }] },
      { featureType:"water", elementType:"geometry", stylers:[{ color:"#0b1b2b" }] }
    ]
  });
}

function getZoneColor(score){
  if(score >= 65) return '#00ff88';
  if(score >= 50) return '#facc15';
  return '#ef4444';
}

function updateMapMarkers(zones){
  if(!map) return;
  markers.forEach(marker => marker.setMap(null));
  markers = [];
  markerByZone = {};
  infoByZone = {};

  zones.forEach(zone => {
    const position = zoneLocations[zone.name];
    if(!position) return;

    const marker = new google.maps.Marker({
      position,
      map,
      title:`${zone.name} - Score ${zone.score}`,
      label:{
        text:String(zone.score),
        color:'#000',
        fontWeight:'900',
        fontSize:'14px'
      },
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        fillColor:getZoneColor(zone.score),
        fillOpacity:1,
        strokeColor:'#ffffff',
        strokeWeight:2,
        scale:14
      }
    });

    const info = new google.maps.InfoWindow({
      content:`
        <div style="color:#111;font-family:Arial;min-width:190px;">
          <strong>${zone.name}</strong><br>
          Score: ${zone.score}<br>
          Action: ${zone.action}<br>
          Est. $/hour: $${zone.estimatedHourly}<br>
          Drive Time: ${zone.driveTime || 'N/A'}<br>
          Distance: ${zone.distance || 'N/A'}<br>
          Traffic: ${zone.traffic}<br>
          Efficiency: ${zone.efficiency}
        </div>
      `
    });

    marker.addListener('click', () => info.open(map, marker));

    markerByZone[zone.name] = marker;
    infoByZone[zone.name] = info;
    markers.push(marker);
  });
}

function focusZone(zoneName){
  const position = zoneLocations[zoneName];
  const marker = markerByZone[zoneName];
  const info = infoByZone[zoneName];

  if(!position || !marker || !map) return;

  map.setCenter(position);
  map.setZoom(13);

  if(info) info.open(map, marker);

  window.scrollTo({
    top:document.getElementById('map').offsetTop - 20,
    behavior:'smooth'
  });
}

function navigateToZone(zoneName){
  const position = zoneLocations[zoneName];

  if(!position){
    console.log('ZONE NOT FOUND:', zoneName);
    return;
  }

  const destination = encodeURIComponent(
    `${position.lat},${position.lng}`
  );

  const googleMapsUrl =
    `https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=driving`;

  window.location.href = googleMapsUrl;
}

function focusZoneEncoded(encodedName){
  const decoded = decodeURIComponent(encodedName);
  focusZone(decoded);
}

function navigateToZoneEncoded(encodedName){
  const decoded = decodeURIComponent(encodedName);
  navigateToZone(decoded);
}

function speakDecision(text){
  if(!('speechSynthesis' in window)) return;
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'en-US';
  msg.rate = 1;
  msg.pitch = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function renderBestMove(bestMove){
  const container = document.getElementById('bestMove');

  if(!bestMove){
    container.innerHTML = '';
    return;
  }

  const safeBestMoveName = encodeURIComponent(bestMove.name);
  const bestPosition = zoneLocations[bestMove.name];

  container.innerHTML = `
    <div class="best-move">
      <div class="best-move-label">AI BEST MOVE RIGHT NOW</div>
      <div class="best-move-name">${bestMove.name}</div>
      <div class="best-move-action">${bestMove.action}</div>

      <div class="best-move-grid">
        <div class="best-move-stat">
          <div class="best-move-stat-label">Efficiency</div>
          <div class="best-move-stat-value">${bestMove.efficiency}</div>
        </div>

        <div class="best-move-stat">
          <div class="best-move-stat-label">Drive Time</div>
          <div class="best-move-stat-value">${bestMove.driveTime}</div>
        </div>

        <div class="best-move-stat">
          <div class="best-move-stat-label">Distance</div>
          <div class="best-move-stat-value">${bestMove.distance}</div>
        </div>

        <div class="best-move-stat">
          <div class="best-move-stat-label">Est. Hourly</div>
          <div class="best-move-stat-value">$${bestMove.estimatedHourly}</div>
        </div>
      </div>

      <button class="map-btn" onclick="focusZoneEncoded('${safeBestMoveName}')">
        📍 View on Map
      </button>

      <button class="map-btn nav-btn" onclick="window.location.href='https://www.google.com/maps/dir/?api=1&destination=${bestPosition.lat},${bestPosition.lng}&travelmode=driving'">
        🧭 Go with Google Maps
      </button>
    </div>
  `;
}

function evaluatePassengerRating(rating){
  if(!rating) return { label:'Unknown rating', tipScore:0, riskScore:-3 };

  if(rating >= 4.95) return { label:'Excellent passenger / high tip chance', tipScore:10, riskScore:0 };
  if(rating >= 4.85) return { label:'Good passenger / decent tip chance', tipScore:6, riskScore:0 };
  if(rating >= 4.75) return { label:'Average passenger / normal risk', tipScore:2, riskScore:-3 };
  return { label:'Low rating / higher risk', tipScore:-6, riskScore:-10 };
}

function checkOrderFromOCR(parsed){
  const pay = parsed.pay;
  const rating = parsed.rating;
  const pickupMinutes = parsed.pickupMinutes || 0;
  const pickupMiles = parsed.pickupMiles || 0;
  const tripMinutes = parsed.tripMinutes || 0;
  const tripMiles = parsed.tripMiles || 0;

  const result = document.getElementById('orderResult');

  if(!pay){
    result.innerHTML = `<div class="order-result bad">Could not detect pay from screenshot.</div>`;
    return;
  }

  const totalMinutes = pickupMinutes + tripMinutes;
  const totalMiles = pickupMiles + tripMiles;
  const dollarsPerMile = pay / totalMiles;
  const hourlyRate = pay / (totalMinutes / 60);
  const dollarsPerMinute = pay / totalMinutes;

  const passenger = evaluatePassengerRating(rating);

  let baseScore = 50;

  if(hourlyRate >= 35) baseScore += 22;
  else if(hourlyRate >= 30) baseScore += 16;
  else if(hourlyRate >= 25) baseScore += 8;
  else if(hourlyRate >= 20) baseScore += 0;
  else baseScore -= 14;

  if(dollarsPerMile >= 2) baseScore += 14;
  else if(dollarsPerMile >= 1.5) baseScore += 8;
  else if(dollarsPerMile >= 1.1) baseScore += 0;
  else baseScore -= 16;

  if(pickupMinutes >= 20) baseScore -= 12;
  else if(pickupMinutes >= 15) baseScore -= 8;
  else if(pickupMinutes <= 6) baseScore += 6;

  if(pickupMiles >= 10) baseScore -= 12;
  else if(pickupMiles >= 7) baseScore -= 8;

  if(totalMinutes >= 60) baseScore -= 15;
  else if(totalMinutes >= 45) baseScore -= 8;

  baseScore += passenger.tipScore;
  baseScore += passenger.riskScore;

  if(baseScore > 100) baseScore = 100;
  if(baseScore < 0) baseScore = 0;

  let visualClass = 'reject';
  let visualTitle = 'RECHAZA';
  let visualIcon = '×';
  let voice = 'Bad order. Reject it.';

  if(baseScore >= 72){
    visualClass = 'accept';
    visualTitle = 'ACEPTA';
    visualIcon = '✓';
    voice = 'Good order. Take it.';
  }
  else if(baseScore >= 55){
    visualClass = 'wait';
    visualTitle = 'ESPERA';
    visualIcon = '!';
    voice = 'Regular order. Be careful.';
  }

  const reasons = [];
  if(hourlyRate < 25) reasons.push(`$${hourlyRate.toFixed(2)}/hr < mínimo $25.00/hr`);
  if(totalMinutes > 20) reasons.push(`${totalMinutes.toFixed(0)} min totales > máximo 20 min`);
  if(totalMiles > 10) reasons.push(`${totalMiles.toFixed(1)} mi totales > máximo 10.0 mi`);
  if(pickupMiles > 7) reasons.push(`${pickupMiles.toFixed(1)} mi pickup muy lejos`);
  if(rating && rating >= 4.90) reasons.push(`Pasajero ${rating.toFixed(2)} ⭐: alta posibilidad de tip`);
  if(reasons.length === 0) reasons.push("Parámetros dentro de rangos óptimos.");

  result.innerHTML = `
    <div class="premium-result ${visualClass}">
      <div class="premium-header">
        <div class="premium-left">
          <div class="decision-icon">${visualIcon}</div>
          <div>
            <div class="decision-title">${visualTitle}</div>
            <div class="platform-label">Uber / Lyft</div>
          </div>
        </div>
        <div class="premium-pay">$${pay.toFixed(2)}</div>
      </div>

      <div class="metric-pills">
        <div class="metric-pill">$${dollarsPerMile.toFixed(2)} <span>/mi</span></div>
        <div class="metric-pill">$${hourlyRate.toFixed(2)} <span>/hr</span></div>
        <div class="metric-pill">$${dollarsPerMinute.toFixed(3)} <span>/min</span></div>
      </div>

      <div class="trip-row">
        <div>➤ ${tripMiles.toFixed(1)} mi viaje</div>
        <div>📍 ${pickupMiles.toFixed(1)} mi pickup</div>
        <div>⏳ ${totalMinutes.toFixed(0)} min</div>
      </div>

      <div class="reason-box">
        ${reasons.map(r => `• ${r}`).join('<br>')}
      </div>

      <button class="earnings-btn" onclick="addToEarnings(${pay.toFixed(2)})">
        ＋ Agregar a Ganancias
      </button>
    </div>
  `;

  speakDecision(voice);
}

function addToEarnings(amount){
  const today = new Date().toISOString().slice(0,10);
  const key = `rideSmartEarnings_${today}`;
  const current = parseFloat(localStorage.getItem(key) || '0');
  const updated = current + amount;
  localStorage.setItem(key, updated.toFixed(2));
  alert(`Ganancias de hoy: $${updated.toFixed(2)}`);
}

async function loadZones(){
  const container = document.getElementById('zones');
  if(!container) return;

  container.innerHTML = `
    <div class="card">
      <div class="zone-name">Loading AI zones...</div>
      <div class="recommendation">Calculating traffic, demand, flights and efficiency.</div>
    </div>
  `;

  try{
    const response = await fetch(`/api/zones?t=${Date.now()}`);
    const data = await response.json();

    if(!data.success){
      throw new Error(data.error || 'Zones API error');
    }

    let zones = data.bestZones || [];

    zones = zones.map(zone => {
      const efficiency =
        zone.efficiency ||
        Math.round(
          zone.score +
          zone.estimatedHourly -
          ((zone.driveMinutes || 0) * 0.8) -
          ((zone.driverSaturation || 0) * 0.15)
        );

      return {
        ...zone,
        efficiency
      };
    });

    zones.sort((a,b) => b.score - a.score);

    document.getElementById('weather').innerHTML = `
      <div class="weather-banner">
        🌤️ Live AI Zone Analysis • Weather: ${data.weather || 'N/A'} • Updated ${new Date().toLocaleTimeString()}
      </div>
    `;

    renderBestMove(zones[0]);

    container.innerHTML = '';

    zones.forEach((zone,index) => {
      const card = document.createElement('div');

      const actionClass = zone.action.replaceAll(' ','-').toLowerCase();
      const safeZoneName = encodeURIComponent(zone.name);
      const position = zoneLocations[zone.name];

      const risk = zone.risk || 'LOW';
      const riskClass = risk.toLowerCase();

      card.className = `card risk-${riskClass}`;

      const insightsHTML = Array.isArray(zone.insights) && zone.insights.length
        ? `
          <div class="ai-insights">
            ${zone.insights.slice(0,4).map(item => `<div class="insight-pill">${item}</div>`).join('')}
          </div>
        `
        : `
          <div class="ai-insights">
            <div class="insight-pill">🤖 AI calculated zone score</div>
          </div>
        `;

      card.innerHTML = `
        ${index === 0 ? `<div class="top-badge">🔥 BEST AREA NOW</div>` : ''}

        <div class="zone-card-top">
          <div>
            <div class="zone-name">${zone.name}</div>
            <div class="risk-label ${riskClass}">${risk} RISK</div>
          </div>
          <div class="score">${zone.score}</div>
        </div>

        <div class="action ${actionClass}">${zone.action}</div>

        ${insightsHTML}

        <button class="map-btn" onclick="focusZoneEncoded('${safeZoneName}')">
          📍 View on Map
        </button>

        ${
          position
            ? `<button class="map-btn nav-btn" onclick="window.location.href='https://www.google.com/maps/dir/?api=1&destination=${position.lat},${position.lng}&travelmode=driving'">🧭 Nav</button>`
            : ''
        }

        <div class="recommendation">
          Est. $/hr: $${zone.estimatedHourly}<br>
          Efficiency: ${zone.efficiency}%<br>
          Drive: ${zone.driveTime || 'N/A'} • ${zone.distance || 'N/A'}<br>
          Traffic: ${zone.traffic} • Saturation: ${zone.driverSaturation}
        </div>
      `;

      container.appendChild(card);
    });

    updateMapMarkers(zones);

  }catch(error){
    console.error(error);

    document.getElementById('weather').innerHTML = `
      <div class="weather-banner">
        ⚠️ Could not load live AI zones
      </div>
    `;

    container.innerHTML = `
      <div class="card">
        <div class="zone-name">AI Zones Error</div>
        <div class="recommendation">${error.message}</div>
      </div>
    `;
  }
}

function useMyLocation(){
  if(!navigator.geolocation) return;
  const btn = document.getElementById('locationBtn');
  if(!btn) return;
  btn.disabled = true;
  btn.innerText = '⌛ Locating...';

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      currentUserLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
      if(map){
        map.setCenter(currentUserLocation);
        if(userMarker) userMarker.setMap(null);
        userMarker = new google.maps.Marker({
          position: currentUserLocation,
          map,
          icon:{ path:google.maps.SymbolPath.CIRCLE, fillColor:'#3b82f6', fillOpacity:1, strokeColor:'#ffffff', strokeWeight:3, scale:10 }
        });
      }
      await loadZones();
      btn.disabled = false;
      btn.innerText = '📍 Use My Location';
    },
    () => { btn.disabled = false; btn.innerText = '📍 Use My Location'; }
  );
}

function parseUberText(text){

  const clean = text
    .replace(/\n+/g,' ')
    .replace(/\s+/g,' ')
    .replace(/,/g,'.');

  console.log('OCR TEXT:', clean);

  // PAY
  const payMatches = [...clean.matchAll(/\$\s?(\d+(\.\d{1,2})?)/g)];

  let pay = null;

  if(payMatches.length){
    pay = Math.max(
      ...payMatches.map(m => parseFloat(m[1]))
    );
  }

  // RATING
  const ratingMatch =
    clean.match(/(4\.\d{2})/) ||
    clean.match(/(5\.00)/);

  const rating =
    ratingMatch
      ? parseFloat(ratingMatch[1])
      : null;

  // TIME + DISTANCE BLOCKS
  const blocks = [
    ...clean.matchAll(
      /(\d+)\s*(hr|h)?\s*(\d+)?\s*min.*?(\d+(\.\d+)?)\s*mi/gi
    )
  ];

  let pickupMinutes = 0;
  let pickupMiles = 0;

  let tripMinutes = 0;
  let tripMiles = 0;

  if(blocks[0]){

    const hr =
      blocks[0][2]
        ? parseFloat(blocks[0][1])
        : 0;

    const min =
      blocks[0][2]
        ? parseFloat(blocks[0][3] || 0)
        : parseFloat(blocks[0][1]);

    pickupMinutes = (hr * 60) + min;
    pickupMiles = parseFloat(blocks[0][4]);
  }

  if(blocks[1]){

    const hr =
      blocks[1][2]
        ? parseFloat(blocks[1][1])
        : 0;

    const min =
      blocks[1][2]
        ? parseFloat(blocks[1][3] || 0)
        : parseFloat(blocks[1][1]);

    tripMinutes = (hr * 60) + min;
    tripMiles = parseFloat(blocks[1][4]);
  }

  // FALLBACKS

  if(!tripMiles){

    const miMatches = [
      ...clean.matchAll(/(\d+(\.\d+)?)\s*mi/gi)
    ];

    if(miMatches[1]){
      tripMiles = parseFloat(miMatches[1][1]);
    }
  }

  if(!tripMinutes){

    const minMatches = [
      ...clean.matchAll(/(\d+)\s*min/gi)
    ];

    if(minMatches[1]){
      tripMinutes = parseFloat(minMatches[1][1]);
    }
  }

  return {
    pay,
    rating,
    pickupMinutes,
    pickupMiles,
    tripMinutes,
    tripMiles
  };
}

document.getElementById('uberScreenshot').addEventListener('change', async function(e){
  const file = e.target.files[0];
  if(!file) return;
  const status = document.getElementById('ocrStatus');
  status.innerHTML = `<div class="order-result medium">Reading Uber order...</div>`;

  try{
    const result = await Tesseract.recognize(file, 'eng');
    const parsed = parseUberText(result.data.text);
    status.innerHTML = `<div class="order-result good">Screenshot read successfully.</div>`;
    checkOrderFromOCR(parsed);
  }catch(error){
    status.innerHTML = `<div class="order-result bad">Error reading screenshot.</div>`;
  }
});
