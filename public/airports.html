<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ride Smart AI | Airports</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:#050505;
  color:white;
  padding:14px;
  padding-bottom:90px;
}

.back-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#00ff88;
  color:#000;
  font-size:16px;
  font-weight:900;
  margin-bottom:24px;
  cursor:pointer;
}

.app-header{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  margin-bottom:40px;
}

.app-title{font-size:34px;font-weight:900}

.profile-dot{
  justify-self:end;
  width:44px;
  height:44px;
  border-radius:50%;
  background:#10b981;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:22px;
}

.airport-title{
  font-size:42px;
  line-height:1.1;
  font-weight:900;
  margin-bottom:12px;
}

.airport-subtitle{
  color:#9ca3af;
  font-size:18px;
  margin-bottom:22px;
}

.airport-tabs{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:14px;
  margin-bottom:22px;
}

.airport-tab{
  min-width:170px;
  background:#1f2937;
  border:2px solid rgba(255,255,255,.10);
  border-radius:18px;
  padding:18px;
  color:white;
  cursor:pointer;
  transition:.2s;
}

.airport-tab.active{
  border-color:#3b82f6;
  background:#1e3a5f;
}

.airport-code{
  font-size:34px;
  font-weight:900;
  color:#60a5fa;
}

.airport-name-small{
  font-size:17px;
  font-weight:800;
  margin-top:6px;
}

.airport-distance{
  color:#9ca3af;
  margin-top:8px;
  font-size:15px;
}

.selected-airport{
  background:#111827;
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  padding:22px;
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:26px;
}

.airport-icon{
  width:54px;
  height:54px;
  border-radius:14px;
  background:#3b82f6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}

.arrival-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.arrival-header h2{font-size:24px;font-weight:900}
.arrival-header span{color:#9ca3af;font-weight:800}

.demand-alert{
  background:rgba(16,185,129,.18);
  border:1px solid #10b981;
  color:#34d399;
  padding:18px;
  border-radius:18px;
  font-size:18px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:22px;
}

.flights-list{
  display:grid;
  gap:14px;
}

.flight-card{
  background:#111827;
  border:1px solid rgba(255,255,255,.10);
  border-radius:20px;
  padding:18px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:16px;
  align-items:center;
}

.flight-time{
  font-size:22px;
  font-weight:900;
  white-space:nowrap;
}

.flight-main{
  font-size:18px;
  font-weight:900;
}

.flight-sub{
  color:#9ca3af;
  margin-top:4px;
  font-size:14px;
}

.flight-pax{
  color:#00ff88;
  font-weight:900;
  margin-top:8px;
}

.flight-status{
  background:#064e3b;
  color:#34d399;
  padding:8px 12px;
  border-radius:12px;
  font-size:13px;
  font-weight:900;
  width:max-content;
}

.loading-card{
  background:#111827;
  border-radius:20px;
  padding:22px;
  text-align:center;
  font-weight:900;
}

@media(max-width:520px){
  .flight-card{grid-template-columns:1fr}
  .airport-title{font-size:34px}
}
</style>
</head>

<body>

<a href="/">
  <button class="back-btn">⬅️ Volver a Ride Smart AI</button>
</a>

<div class="app-header">
  <div></div>
  <div class="app-title">Ride Smart</div>
  <div class="profile-dot">R</div>
</div>

<h1 class="airport-title">✈️ Aeropuertos Cercanos</h1>

<p class="airport-subtitle">
  Llegadas reales • Demanda estimada • Pasajeros aproximados
</p>

<div class="airport-tabs" id="airportTabs"></div>
<div class="selected-airport" id="selectedAirport"></div>

<div class="arrival-header">
  <h2>🟢 Próximas Llegadas</h2>
  <span id="flightCount">0 vuelos</span>
</div>

<div class="demand-alert" id="demandAlert">Cargando demanda...</div>
<div class="flights-list" id="flightsList"></div>

<script>
const airportMap = {
  KORD:{
    code:"ORD",
    name:"O'Hare Intl",
    city:"Chicago",
    distance:"22.1 km"
  },
  KMDW:{
    code:"MDW",
    name:"Midway Intl",
    city:"Chicago",
    distance:"18.4 km"
  }
};

const cityNames = {
  ATL:"Atlanta",
  AUS:"Austin",
  BDL:"Hartford",
  BNA:"Nashville",
  BOS:"Boston",
  CHS:"Charleston",
  CMH:"Columbus",
  DEN:"Denver",
  DSM:"Des Moines",
  DUB:"Dublin",
  FNT:"Flint",
  FWA:"Fort Wayne",
  HSV:"Huntsville",
  IAH:"Houston",
  KEF:"Reykjavik",
  LAS:"Las Vegas",
  LAX:"Los Angeles",
  LGA:"New York",
  LHR:"London",
  MIA:"Miami",
  MKE:"Milwaukee",
  ORF:"Norfolk",
  PWM:"Portland",
  RIC:"Richmond",
  SEA:"Seattle",
  TVC:"Traverse City",
  YYZ:"Toronto"
};

function parseFlightDate(timeString){
  if(!timeString) return null;

  const clean = String(timeString)
    .replace(' ', 'T')
    .replace(/([+-]\d{2})(\d{2})$/, '$1:$2');

  const date = new Date(clean);

  if(isNaN(date.getTime())) return null;

  return date;
}

function formatChicagoTime(timeString){
  const date = parseFlightDate(timeString);

  if(!date) return 'N/A';

  return date.toLocaleTimeString('en-US',{
    timeZone:'America/Chicago',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function normalizeStatus(status){
  if(!status || status === 'Unknown') return 'Expected';
  return status;
}

function estimatePassengers(flight){
  if(flight.estimatedPassengers) return flight.estimatedPassengers;

  const number = String(flight.flightNumber || '');

  if(number.includes('UA')) return 150;
  if(number.includes('AA')) return 150;
  if(number.includes('DL')) return 145;
  if(number.includes('WN')) return 150;
  if(number.includes('BA')) return 220;
  if(number.includes('AC')) return 140;

  return 'N/A';
}

async function loadAirports(activeCode = 'KORD'){
  const tabs = document.getElementById('airportTabs');
  const selected = document.getElementById('selectedAirport');
  const count = document.getElementById('flightCount');
  const alertBox = document.getElementById('demandAlert');
  const list = document.getElementById('flightsList');

  tabs.innerHTML = Object.entries(airportMap).map(([icao,airport]) => `
    <div class="airport-tab ${icao === activeCode ? 'active' : ''}" onclick="loadAirports('${icao}')">
      <div class="airport-code">${airport.code}</div>
      <div class="airport-name-small">${airport.name}</div>
      <div class="airport-distance">📍 ${airport.distance}</div>
    </div>
  `).join('');

  const airport = airportMap[activeCode];

  selected.innerHTML = `
    <div class="airport-icon">✈️</div>
    <div>
      <div style="font-size:24px;font-weight:900">${airport.name}</div>
      <div style="color:#9ca3af;font-size:16px">${airport.city} • ${airport.code}</div>
      <div style="color:#10b981;font-size:16px;font-weight:900;margin-top:4px">
        ${airport.distance} de tu ubicación
      </div>
    </div>
  `;

  list.innerHTML = `
    <div class="loading-card">⌛ Cargando vuelos reales...</div>
  `;

  try{
    const response = await fetch(`/api/airports/arrivals/${activeCode}?t=${Date.now()}`);
    const data = await response.json();

    if(!data.success){
      throw new Error('Airport API Error');
    }

    const now = new Date();
    const thirtyMinutesAgo = new Date(now.getTime() - 30 * 60 * 1000);

    let arrivals = Array.isArray(data.arrivals) ? data.arrivals : [];

    arrivals = arrivals
      .map(flight => ({
        ...flight,
        parsedDate: parseFlightDate(flight.arrivalTime)
      }))
      .filter(flight => flight.parsedDate)
      .filter(flight => flight.parsedDate >= thirtyMinutesAgo)
      .sort((a,b) => a.parsedDate - b.parsedDate)
      .slice(0,20);

    count.innerText = `${arrivals.length} vuelos`;

    const totalPassengers = arrivals.reduce((sum,flight) => {
      const pax = estimatePassengers(flight);
      return sum + (typeof pax === 'number' ? pax : 0);
    },0);

    alertBox.innerText =
      arrivals.length
        ? `🔥 ALTA DEMANDA: ${arrivals.length} vuelos próximos • aprox. ${totalPassengers} pasajeros llegando`
        : 'No hay vuelos próximos en este momento.';

    if(!arrivals.length){
      list.innerHTML = `
        <div class="loading-card">No hay vuelos próximos</div>
      `;
      return;
    }

    list.innerHTML = arrivals.map(flight => {
      const localTime = formatChicagoTime(flight.arrivalTime);
      const city = flight.city && flight.city !== 'Unknown'
        ? flight.city
        : (cityNames[flight.from] || 'Unknown');

      const pax = estimatePassengers(flight);

      return `
        <div class="flight-card">
          <div class="flight-time">${localTime}</div>

          <div>
            <div class="flight-main">✈️ ${flight.flightNumber}</div>
            <div class="flight-sub">${flight.airline}</div>
            <div class="flight-sub">Desde ${flight.from} • ${city}</div>
            <div class="flight-sub">🛬 Terminal ${flight.terminal || 'N/A'}</div>
            <div class="flight-pax">👥 ${pax} pasajeros aprox.</div>
          </div>

          <div class="flight-status">${normalizeStatus(flight.status)}</div>
        </div>
      `;
    }).join('');

  }catch(err){
    console.error(err);

    count.innerText = '0 vuelos';
    alertBox.innerText = 'No se pudieron cargar vuelos reales';

    list.innerHTML = `
      <div class="loading-card">Error loading real flights</div>
    `;
  }
}

loadAirports();

setInterval(() => {
  const active = document.querySelector('.airport-tab.active .airport-code')?.innerText;
  loadAirports(active === 'MDW' ? 'KMDW' : 'KORD');
},60000);
</script>

</body>
</html>
