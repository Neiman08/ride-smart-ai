<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ride Smart AI | Airports</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,255,136,.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(59,130,246,.18), transparent 40%),
    #050505;
  color:white;
  min-height:100vh;
  padding:18px;
  padding-bottom:170px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.back{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:white;
  padding:12px 16px;
  border-radius:16px;
  text-decoration:none;
  font-weight:900;
}

.badge{
  background:#00ff88;
  color:#001b0d;
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.title{
  font-size:38px;
  line-height:1.05;
  font-weight:900;
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  font-size:16px;
  line-height:1.5;
  margin-bottom:24px;
}

.status-card{
  background:linear-gradient(135deg, rgba(0,255,136,.20), rgba(59,130,246,.14));
  border:1px solid rgba(0,255,136,.35);
  border-radius:28px;
  padding:22px;
  margin-bottom:22px;
  box-shadow:0 20px 60px rgba(0,255,136,.08);
}

.status-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.status-title{
  font-size:20px;
  font-weight:900;
}

.status-value{
  color:#00ff88;
  font-weight:900;
}

.card{
  background:rgba(17,24,39,.82);
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(18px);
  margin-bottom:16px;
}

.card-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
}

.card-desc{
  color:#9ca3af;
  font-size:14px;
  line-height:1.4;
  margin-bottom:18px;
}

.airport-tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:18px;
}

.airport-tab{
  background:rgba(17,24,39,.82);
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:18px;
  cursor:pointer;
  backdrop-filter:blur(18px);
  transition:.2s;
}

.airport-tab.active{
  background:linear-gradient(135deg,#00ff88,#3b82f6);
  color:#001b0d;
  border-color:rgba(0,255,136,.45);
}

.airport-code{
  font-size:34px;
  font-weight:900;
}

.airport-name-small{
  font-size:15px;
  font-weight:900;
  margin-top:6px;
}

.airport-distance{
  color:#9ca3af;
  margin-top:8px;
  font-size:13px;
  font-weight:800;
}

.airport-tab.active .airport-distance{
  color:#062014;
}

.selected-airport{
  background:linear-gradient(135deg, rgba(0,255,136,.20), rgba(59,130,246,.14));
  border:1px solid rgba(0,255,136,.35);
  border-radius:28px;
  padding:22px;
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:22px;
  box-shadow:0 20px 60px rgba(0,255,136,.08);
}

.airport-icon{
  width:54px;
  height:54px;
  border-radius:18px;
  background:#00ff88;
  color:#001b0d;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  flex:0 0 auto;
}

.arrival-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:22px 0 16px;
}

.arrival-header h2{
  font-size:20px;
  font-weight:900;
}

.arrival-header span{
  color:#00ff88;
  font-weight:900;
}

.demand-alert{
  background:rgba(17,24,39,.82);
  border:1px solid rgba(0,255,136,.35);
  color:#00ff88;
  padding:20px;
  border-radius:24px;
  font-size:16px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:18px;
  backdrop-filter:blur(18px);
}

.flights-list{
  display:grid;
  gap:16px;
}

.flight-card{
  background:rgba(17,24,39,.82);
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(18px);
}

.flight-time{
  font-size:26px;
  font-weight:900;
  color:#00ff88;
  margin-bottom:10px;
}

.flight-main{
  font-size:18px;
  font-weight:900;
}

.flight-sub{
  color:#9ca3af;
  margin-top:5px;
  font-size:14px;
}

.flight-pax{
  color:#00ff88;
  font-weight:900;
  margin-top:10px;
}

.flight-status{
  display:inline-block;
  background:#00ff88;
  color:#001b0d;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin-top:12px;
}

.loading-card{
  background:rgba(17,24,39,.82);
  border:1px solid rgba(255,255,255,.10);
  border-radius:24px;
  padding:22px;
  text-align:center;
  font-weight:900;
  backdrop-filter:blur(18px);
}

.footer-nav{
  position:fixed;
  left:14px;
  right:14px;
  bottom:14px;
  background:rgba(10,10,10,.92);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  padding:10px;
  backdrop-filter:blur(20px);
}

.footer-nav a{
  text-align:center;
  text-decoration:none;
  color:#9ca3af;
  font-size:12px;
  font-weight:900;
  padding:10px 4px;
  border-radius:16px;
}

.footer-nav a.active{
  background:#00ff88;
  color:#001b0d;
}

@media(min-width:800px){
  body{max-width:900px;margin:0 auto}
}
</style>
</head>

<body>

<div class="header">
  <a class="back" href="/">← Volver</a>
  <div class="badge">AIRPORT MODE</div>
</div>

<h1 class="title">Airport<br>Demand</h1>

<p class="subtitle">
  Llegadas reales • Demanda estimada • Pasajeros aproximados
</p>

<div class="status-card">
  <div class="status-top">
    <div class="status-title">Aeropuertos cercanos</div>
    <div class="status-value" id="flightCount">0 vuelos</div>
  </div>
  <p class="card-desc">
    Revisa llegadas próximas en ORD y MDW para decidir cuándo moverte hacia zonas de alta demanda.
  </p>
</div>

<div class="airport-tabs" id="airportTabs"></div>

<div class="selected-airport" id="selectedAirport"></div>

<div class="arrival-header">
  <h2>🟢 Próximas Llegadas</h2>
  <span>LIVE</span>
</div>

<div class="demand-alert" id="demandAlert">Cargando demanda...</div>
<div class="flights-list" id="flightsList"></div>

<div class="footer-nav">
  <a href="/">Home</a>
  <a class="active" href="/airports.html">Airports</a>
  <a href="/filters.html">Filters</a>
  <a href="/miles.html">Miles</a>
</div>

<script>
const airportMap = {
  KORD:{
    code:"ORD",
    name:"O'Hare Intl",
    city:"Chicago",
    distance:"22.1 km"
  },
  KMDW:{
    code:"MDW",
    name:"Midway Intl",
    city:"Chicago",
    distance:"18.4 km"
  }
};

const cityNames = {
  ATL:"Atlanta",
  AUS:"Austin",
  BDL:"Hartford",
  BNA:"Nashville",
  BOS:"Boston",
  CHS:"Charleston",
  CMH:"Columbus",
  DEN:"Denver",
  DSM:"Des Moines",
  DUB:"Dublin",
  FNT:"Flint",
  FWA:"Fort Wayne",
  HSV:"Huntsville",
  IAH:"Houston",
  KEF:"Reykjavik",
  LAS:"Las Vegas",
  LAX:"Los Angeles",
  LGA:"New York",
  LHR:"London",
  MIA:"Miami",
  MKE:"Milwaukee",
  ORF:"Norfolk",
  PWM:"Portland",
  RIC:"Richmond",
  SEA:"Seattle",
  TVC:"Traverse City",
  YYZ:"Toronto"
};

function parseFlightDate(timeString){
  if(!timeString) return null;

  const clean = String(timeString)
    .replace(' ', 'T')
    .replace(/([+-]\d{2})(\d{2})$/, '$1:$2');

  const date = new Date(clean);

  if(isNaN(date.getTime())) return null;

  return date;
}

function formatChicagoTime(timeString){
  const date = parseFlightDate(timeString);

  if(!date) return 'N/A';

  return date.toLocaleTimeString('en-US',{
    timeZone:'America/Chicago',
    hour:'2-digit',
    minute:'2-digit'
  });
}

function normalizeStatus(status){
  if(!status || status === 'Unknown') return 'Expected';
  return status;
}

function estimatePassengers(flight){
  if(flight.estimatedPassengers) return flight.estimatedPassengers;

  const number = String(flight.flightNumber || '');

  if(number.includes('UA')) return 150;
  if(number.includes('AA')) return 150;
  if(number.includes('DL')) return 145;
  if(number.includes('WN')) return 150;
  if(number.includes('BA')) return 220;
  if(number.includes('AC')) return 140;

  return 'N/A';
}

async function loadAirports(activeCode = 'KORD'){
  const tabs = document.getElementById('airportTabs');
  const selected = document.getElementById('selectedAirport');
  const count = document.getElementById('flightCount');
  const alertBox = document.getElementById('demandAlert');
  const list = document.getElementById('flightsList');

  tabs.innerHTML = Object.entries(airportMap).map(([icao,airport]) => `
    <div class="airport-tab ${icao === activeCode ? 'active' : ''}" onclick="loadAirports('${icao}')">
      <div class="airport-code">${airport.code}</div>
      <div class="airport-name-small">${airport.name}</div>
      <div class="airport-distance">📍 ${airport.distance}</div>
    </div>
  `).join('');

  const airport = airportMap[activeCode];

  selected.innerHTML = `
    <div class="airport-icon">✈️</div>
    <div>
      <div style="font-size:24px;font-weight:900">${airport.name}</div>
      <div style="color:#9ca3af;font-size:16px">${airport.city} • ${airport.code}</div>
      <div style="color:#00ff88;font-size:16px;font-weight:900;margin-top:4px">
        ${airport.distance} de tu ubicación
      </div>
    </div>
  `;

  list.innerHTML = `
    <div class="loading-card">⌛ Cargando vuelos reales...</div>
  `;

  try{
    const response = await fetch(`/api/airports/arrivals/${activeCode}?t=${Date.now()}`);
    const data = await response.json();

    if(!data.success){
      throw new Error('Airport API Error');
    }

    const now = new Date();
    const thirtyMinutesAgo = new Date(now.getTime() - 30 * 60 * 1000);

    let arrivals = Array.isArray(data.arrivals) ? data.arrivals : [];

    arrivals = arrivals
      .map(flight => ({
        ...flight,
        parsedDate: parseFlightDate(flight.arrivalTime)
      }))
      .filter(flight => flight.parsedDate)
      .filter(flight => flight.parsedDate >= thirtyMinutesAgo)
      .sort((a,b) => a.parsedDate - b.parsedDate)
      .slice(0,20);

    count.innerText = `${arrivals.length} vuelos`;

    const totalPassengers = arrivals.reduce((sum,flight) => {
      const pax = estimatePassengers(flight);
      return sum + (typeof pax === 'number' ? pax : 0);
    },0);

    alertBox.innerText =
      arrivals.length
        ? `🔥 ALTA DEMANDA: ${arrivals.length} vuelos próximos • aprox. ${totalPassengers} pasajeros llegando`
        : 'No hay vuelos próximos en este momento.';

    if(!arrivals.length){
      list.innerHTML = `
        <div class="loading-card">No hay vuelos próximos</div>
      `;
      return;
    }

    list.innerHTML = arrivals.map(flight => {
      const localTime = formatChicagoTime(flight.arrivalTime);
      const city = flight.city && flight.city !== 'Unknown'
        ? flight.city
        : (cityNames[flight.from] || 'Unknown');

      const pax = estimatePassengers(flight);

      return `
        <div class="flight-card">
          <div class="flight-time">${localTime}</div>

          <div>
            <div class="flight-main">✈️ ${flight.flightNumber}</div>
            <div class="flight-sub">${flight.airline}</div>
            <div class="flight-sub">Desde ${flight.from} • ${city}</div>
            <div class="flight-sub">🛬 Terminal ${flight.terminal || 'N/A'}</div>
            <div class="flight-pax">👥 ${pax} pasajeros aprox.</div>
          </div>

          <div class="flight-status">${normalizeStatus(flight.status)}</div>
        </div>
      `;
    }).join('');

  }catch(err){
    console.error(err);

    count.innerText = '0 vuelos';
    alertBox.innerText = 'No se pudieron cargar vuelos reales';

    list.innerHTML = `
      <div class="loading-card">Error loading real flights</div>
    `;
  }
}

loadAirports();

setInterval(() => {
  const active = document.querySelector('.airport-tab.active .airport-code')?.innerText;
  loadAirports(active === 'MDW' ? 'KMDW' : 'KORD');
},60000);
</script>

</body>
</html>
